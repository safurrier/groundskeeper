name: CI Debug (Local Testing)

# This workflow is designed for fast local iteration with act
# Usage: mise run ci:debug

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  quick-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv venv
          uv sync --all-extras

      - name: Run Linter
        run: uv run -m ruff check groundskeeper

      - name: Run Type Checker
        run: uv run ty check groundskeeper

      # Add more steps as needed for debugging
      # - name: Run Specific Test
      #   run: uv run -m pytest tests/test_specific.py -v
