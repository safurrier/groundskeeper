# Generated by groundskeeper — do not edit manually
name: Groundskeeper agent runner
"on":
  workflow_call:
    inputs:
      skill:
        type: string
        required: true
      args:
        type: string
        default: ""
    secrets:
      ANTHROPIC_API_KEY:
        required: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv tool install groundskeeper
      - id: render
        run: |
          PROMPT=$(gk render "${{ inputs.skill }}" --args "${{ inputs.args }}")
          echo "prompt<<GK_EOF" >> "$GITHUB_OUTPUT"
          echo "$PROMPT" >> "$GITHUB_OUTPUT"
          echo "GK_EOF" >> "$GITHUB_OUTPUT"
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.render.outputs.prompt }}
